name = "gleamgen"
version = "1.0.2"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
description = "Type-safe gleam codegen (in gleam!)"
licences = ["Apache-2.0"]
repository = { type = "github", user = "Brewingweasel", repo = "gleamgen" }

# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
glam = ">= 2.0.1 and < 3.0.0"
glance = ">= 6.0.0 and < 7.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"

[documentation]
pages = [
	{ title = "Getting Started", path = "getting_started.html", source = "docs/getting_started.md" },
]
